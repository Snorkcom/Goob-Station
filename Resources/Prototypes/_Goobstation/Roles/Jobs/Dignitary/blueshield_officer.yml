- type: job
  id: BlueshieldOfficer
  name: job-name-bs
  description: job-description-bs
  playTimeTracker: JobBlueshieldOfficer
  requirements:
    - !type:DepartmentTimeRequirement
      department: Command
      time: 90000 # 25 hrs
    - !type:DepartmentTimeRequirement
      department: Medical
      time: 54000 # 15 hours
    - !type:DepartmentTimeRequirement
      department: Security
      time: 108000 # CorvaxGoob 25 hrs -> 30 hrs
    - !type:AgeRequirement
      requiredAge: 21
    - !type:RoleTimeRequirement  # CorvaxGoob
      role: JobSurgeon  
      time: 7200 # CorvaxGoob 2 hrs
    - !type:RoleTimeRequirement  # CorvaxGoob
      role: JobCaptain  
      time: 7200 # CorvaxGoob 2 hrs
    - !type:SpeciesRequirement # Goob - None Felinid
      inverted: true
      species:
      - Felinid
    - !type:SpeciesRequirement # CorvaxGoob-Species
      inverted: true
      species:
      - Abductor
  #goobcoins: 45 Corvax-Goob-coins
  guides:
  # - BlueshieldOfficer SOP Hidden by CorvaxGoob
  - Command
  # - Succession Hidden by CorvaxGoob
  weight: 20
  startingGear: BlueshieldOfficerGear
  icon: "JobIconBlueshield"
  joinNotifyCrew: true
  supervisors: job-supervisors-ntr-centcom
  canBeAntag: false
  skills: # CorvaxGoob-Skills
  - ShuttleControl
  - Shooting
  - MedicalEquipment
  - Surgery
  access:
  - Security
  - Brig
  - External
  - Cryogenics
  - Maintenance
  - Engineering
  - Medical
  - Research
  - Command
  - CentralCommand
  - BlueshieldOfficer
  - Service
  - Hydroponics
  - Cargo
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant, BluespaceLifelineImplant ] 
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff
      - type: Condemned
        soulOwnedNotDevil: true

- type: startingGear
  id: BlueshieldOfficerGear
  equipment:
    eyes: ClothingEyesGlassesBSO
    #gloves: ClothingHandsGlovesCombat - Goobstation, moved to loadouts
    id: BlueshieldPDA
    ears: ClothingHeadsetAltBlueshield
    belt: ClothingBeltMilitaryWebbingFilled
    pocket1: UniqueBlueshieldOfficerLockerTeleporter
  storage:
    back:
    - Flash
#   - ClothingBSOMaskGasSwat # CorvaxGoob-loadouts: replaced on a BSOMask loadout
    - CombatKnife

- type: chameleonOutfit
  id: BlueshieldOfficerChameleonOutfit
  job: BlueshieldOfficer
  equipment:
    head: ClothingHeadHatBeretEliteNavyOfficer
    eyes: ClothingEyesGlassesBSO
    mask: ClothingMaskGasSecurity
    ears: ClothingHeadsetAltBlueshield
    outerClothing: ClothingBlueshieldArmourVest
    neck: ClothingNeckMantleBlueshield
    gloves: ClothingHandsGlovesCombat
    jumpsuit: ClothingUniformJumpsuitBlueshieldOfficer
    id: BlueshieldPDA
    back: ClothingBackpackBlueshield
    shoes: ClothingShoesBootsJack

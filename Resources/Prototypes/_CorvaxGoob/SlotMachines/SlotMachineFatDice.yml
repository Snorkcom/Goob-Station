- type: entity
  id: SlotMachineFateDice
  parent: BaseSlotMachine
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/Machines/slotmachines/slotmachinehighroller.rsi
    layers:
      - state: slotmachine
      - state: slotmachine_spin
        visible: false
        map: ["slotmachine_spin"]
  - type: GenericVisualizer
    visuals:
      enum.SlotMachineVisuals.Spinning:
        slotmachine_spin:
          True: { visible: true }
          False: { visible: false }
  - type: Appearance
  - type: Anchorable
    flags: Anchorable
  - type: SlotMachine
    smallWinChance: 0
    mediumWinChance: 0
    bigWinChance: 0
    jackPotWinChance: 0
    godPotWinChance: 0.05
    godPotPrize: DiceOfFate
    deleteGodPot: true
    limitSpins: true
    countSpins: 7
    spinDamage:
      types:
        Blunt: 30
        Cellular: 15

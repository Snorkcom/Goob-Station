    prototypes:
    - MobGiantSpider
    - MobCarp
    - MobShark
    - MobCarpMagic
    - MobCarpHolo
    - MobAdultSlimesBlue
    - MobAdultSlimesGreen
    - MobAdultSlimesYellow
    deleteSpawnerAfterSpawn: true

- type: entity
  id: RandomSpellbook
  name: random spellbook
  parent: MarkerBase
  components:
  - type: RandomSpawner
    prototypes:
    - FireballSpellbook
    - BlinkBook
    - ForceWallSpellbook
    - SmiteBook
    - KnockSpellbook
    - SpawnSpellbook
    deleteSpawnerAfterSpawn: true

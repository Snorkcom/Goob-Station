- type: job
  id: Warden
  name: job-name-warden
  description: job-description-warden
  playTimeTracker: JobWarden
  requirements:
    - !type:RoleTimeRequirement
      role: JobSecurityOfficer
      time: 5h
    - !type:RoleTimeRequirement # Goobstation
      role: JobBrigmedic
      time: 5h
    - !type:DepartmentTimeRequirement
      department: Security
      time: 10h
    - !type:SpeciesRequirement # Goob - None Felinid
      inverted: true
      species:
      - Felinid
    - !type:SpeciesRequirement # CorvaxGoob-Species
      inverted: true
      species:
      - Abductor
  weight: 5
  startingGear: WardenGear
  icon: "JobIconWarden"
  supervisors: job-supervisors-hos
  canBeAntag: false
  #goobcoins: 35 #Goob content Corvax-Goob-coins
  skills: # CorvaxGoob-Skills
  - Shooting
  guides: # goobstation
  # - SpaceLaw Hidden by CorvaxGoob
  # - Legal SOP Hidden by CorvaxGoob
  - Security
  # - Warden SOP Hidden by CorvaxGoob
  - KravMaga
  access:
  - Security
  - Brig
  - Armory
  - Maintenance
  - External
  - Detective
  - Cryogenics
  - GenpopEnter
  - GenpopLeave
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial # goobstation
    components:
      - type: SecurityStaff

- type: startingGear
  id: WardenGear
  equipment:
    eyes: ClothingEyesGlassesSecurityContraDetect # Goobstation
    id: WardenPDA
    ears: ClothingHeadsetAltWarden # Goobstation
    pocket1: WeaponPistolMk58Empty # CorvaxGoob : поставлен пустой прототип пистолета
  storage:
    back:
    - Flash
    - MagazinePistol
    - MagazinePistol # CorvaxGoob-RubberAmmo
    - MagazinePistolRubber # CorvaxGoob-RubberAmmo
#   - ClothingMaskGasSecurity # Goobstation # CorvaxGoob-changes: commented

- type: chameleonOutfit
  id: WardenChameleonOutfit
  job: Warden
  hasMindShield: true
  equipment:
    head: ClothingHeadHatWarden
    mask: ClothingMaskGasSecurity
    outerClothing: ClothingOuterCoatWarden
    jumpsuit: ClothingUniformJumpsuitWarden
    neck: Dinkystar
    belt: ClothingBeltSecurity
    gloves: ClothingHandsGlovesCombat
    shoes: ClothingShoesBootsJack

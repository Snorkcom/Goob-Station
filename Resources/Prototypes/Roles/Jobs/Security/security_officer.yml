- type: job
  id: SecurityOfficer
  name: job-name-security
  description: job-description-security
  playTimeTracker: JobSecurityOfficer
  requirements:
    - !type:DepartmentTimeRequirement
      department: Security
      time: 2.5h
    - !type:SpeciesRequirement # CorvaxGoob-Species
      inverted: true
      species:
      - Abductor
  startingGear: SecurityOfficerGear
  icon: "JobIconSecurityOfficer"
  supervisors: job-supervisors-hos
  canBeAntag: false
  #goobcoins: 30 #Goob content Corvax-Goob-coins
  skills: # CorvaxGoob-Skills
  - Shooting
  guides: # goobstation
  - Security
  # - Legal SOP Hidden by CorvaxGoob
  # - OfficerCadet SOP Hidden by CorvaxGoob
  - CorporateJudo
  # - Alert Levels Hidden by CorvaxGoob
  access:
  - Security
  - Brig
  - Maintenance
  - External
  - Cryogenics
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial # goobstation
    components:
      - type: SecurityStaff

- type: startingGear
  id: SecurityOfficerGear
  equipment:
    eyes: ClothingEyesGlassesSecurity
    ears: ClothingHeadsetAltSecurityRegular # Goobstation
    pocket1: WeaponPistolMk58Empty # CorvaxGoob : поставлен пустой прототип пистолета
  storage:
    back:
    - Flash
    - MagazinePistol
    - MagazinePistol # CorvaxGoob-RubberAmmo
    - MagazinePistolRubber # CorvaxGoob-RubberAmmo

- type: chameleonOutfit
  id: SecurityOfficerChameleonOutfit
  job: SecurityOfficer
  hasMindShield: true
  equipment:
    head: ClothingHeadHatBeretSecurity
    mask: ClothingMaskGasSecurity
    neck: Dinkystar
    gloves: ClothingHandsGlovesColorBlack

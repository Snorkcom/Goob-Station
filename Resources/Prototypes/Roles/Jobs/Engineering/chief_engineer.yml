- type: job
  id: ChiefEngineer
  name: job-name-ce
  description: job-description-ce
  playTimeTracker: JobChiefEngineer
  requirements:
    - !type:RoleTimeRequirement
      role: JobAtmosphericTechnician
      time: 2.5h
    - !type:RoleTimeRequirement
      role: JobStationEngineer
      time: 5h
    - !type:DepartmentTimeRequirement
      department: Engineering
      time: 10h
    - !type:SpeciesRequirement # Goob - None Felinid
      inverted: true
      species:
      - Felinid
    - !type:SpeciesRequirement # CorvaxGoob-Species
      inverted: true
      species:
      - Abductor
  weight: 10
  startingGear: ChiefEngineerGear
  icon: "JobIconChiefEngineer"
  supervisors: job-supervisors-captain
  canBeAntag: false
  #goobcoins: 40 #Goob content Corvax-Goob-coins
  skills: # CorvaxGoob-Skills
  - ShuttleControl
  - AdvancedBuilding
  #canBeAntag: false
  antagAdvantage: 75 # Goobstation
  guides: # goobstation
  - Engineering
  # - ChiefEngineer SOP Hidden by CorvaxGoob
  # - Engineering SOP Hidden by CorvaxGoob
  - Command
  # - Emergencies SOP Hidden by CorvaxGoob
  access:

- type: job
  id: Chef
  name: job-name-chef
  description: job-description-chef
  playTimeTracker: JobChef
  requirements:
    - !type:DepartmentTimeRequirement
      department: Civilian
      time: 0.5h
  startingGear: ChefGear
  icon: "JobIconChef"
  supervisors: job-supervisors-hop
  #goobcoins: 15 #Goob content Corvax-Goob-coins
  skills: # CorvaxGoob-Skills
  - Butchering
  guides: # goobstation
  - Chef
  - FoodRecipes
  - CQC
  access:
  - Service
  - Maintenance
  - Kitchen
  extendedAccess:
  - Hydroponics
  - Bar
  special: # Goobstation - Martial Arts
  - !type:AddComponentSpecial # Goobstation - Martial Arts
    components: # Goobstation - Martial Arts
      - type: GrantCqc # Goobstation - Martial Arts
        startingStage: Hard # Goobstation - Martial Arts
        isBlocked: true # Goobstation - Martial Arts
  - !type:AddImplantSpecial # Chefs speak space italian
    implants: [ SpaceItalianTranslatorImplant ]

- type: startingGear
  id: ChefGear
  equipment:
    shoes: ClothingShoesChef
    id: ChefPDA
    ears: ClothingHeadsetService
    belt: ClothingBeltChefFilled
  #storage:
    #back:
    #- Stuff

- type: chameleonOutfit
  id: ChefChameleonOutfit
  job: Chef
  equipment:
    head: ClothingHeadHatChef
    eyes: ClothingEyesGlassesCheapSunglasses
    mask: ClothingMaskItalianMoustache
    neck: ClothingNeckScarfStripedBrown
    outerClothing: ClothingOuterJacketChef
    gloves: ClothingHandsGlovesColorWhite
    shoes: ClothingShoesChef

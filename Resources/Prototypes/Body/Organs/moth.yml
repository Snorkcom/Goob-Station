- type: entity
  id: OrganMothStomach
  parent: OrganAnimalStomach
  categories: [ HideSpawnMenu ]
  name: moth stomach # Shitmed
  components:
  - type: Sprite
    sprite: _CorvaxGoob/Mobs/Species/Moth/organs.rsi # CorvaxGoob organs resprite start
    state: stomach
  - type: Stomach
    specialDigestible:
      tags:
      - ClothMade
      - Paper
      - Pill
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Metabolizer
    maxPoisonsProcessable: 3
    metabolizerTypes: [ Moth ]
    removeEmpty: true
    groups:
      - id: Food
      - id: Drink

# CorvaxGoob organs resprite start


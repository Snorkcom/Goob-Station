- type: entity
  parent: BaseMobHuman
  name: Urist McOni
  id: MobOniBase
  abstract: true
  components:
  - type: Speech
    speechSounds: Baritone
    speechVerb: Oni
  - type: LanguageKnowledge # Einstein Engines - Languages
    speaks:
    - TauCetiBasic # Nothing else because Rouge said she was adding a language for Oni
    - Gruntish # Goob - Oni Language
    understands:
    - TauCetiBasic
    - Gruntish # Goob - Oni Language
  - type: HumanoidAppearance
    species: Oni
  - type: Sprite
    # scale: 1.2, 1.2 # Goobstation: port EE height/width sliders
  - type: ScaleData # Goobstation
    # scale: 1.2, 1.2 # Goobstation: port EE height/width sliders
  - type: PlayerToolModifier
    pryTimeMultiplier: 0.6
  - type: BonusStaminaDamage
    multiplier: 1.25
  - type: BonusMeleeDamage
    damageModifierSet:
      coefficients:
        Blunt: 1.25
        Slash: 1.25
        Piercing: 1.25
        Asphyxiation: 1.25
        Structural: 1.25
  - type: Body
    prototype: Oni
  - type: Damageable # CorvaxGoob-Fixes
    damageModifierSet: Oni
  - type: LightweightDrunk
    boozeStrengthMultiplier: 0.5 # REAL hard to get drunk
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35 # Goobstation: port EE height/width sliders
        density: 220
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: TypingIndicator
    proto: oni
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - Oni

- type: entity
  save: false
  name: Urist McOni
  parent: MobHumanDummy
  id: MobOniDummy
  categories: [ HideSpawnMenu ]
  description: A dummy oni meant to be used in character setup.

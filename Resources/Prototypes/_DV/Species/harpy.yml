- type: species
  id: Harpy
  name: species-name-harpy
  roundStart: true
  prototype: MobHarpy
  sprites: MobHarpySprites
  markingLimits: MobHarpyMarkingLimits
  dollPrototype: MobHarpyDummy
  skinColoration: HumanToned
  # begin Goobstation: port EE height/width sliders
  minHeight: 0.80
  defaultHeight: 0.80
  maxHeight: 1.2
  minWidth: 0.80
  defaultWidth: 0.80
  maxWidth: 1.2
  # end Goobstation: port EE height/width sliders

- type: speciesBaseSprites
  id: MobHarpySprites
  sprites:
    Head: MobHarpyHead
    Hair: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    Chest: MobHarpyChest
    Groin: MobHarpyGroin
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    Eyes: MobHumanoidEyes
    LArm: MobHarpyLArm
    RArm: MobHarpyRArm
    LHand: MobHarpyLHand
    RHand: MobHarpyRHand
    LLeg: MobHarpyLLeg
    RLeg: MobHarpyRLeg
    LFoot: MobHarpyLFoot
    RFoot: MobHarpyRFoot

- type: markingPoints
  id: MobHarpyMarkingLimits
  points:
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Snout:
      points: 1
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ HarpyTailPhoenix ]
    HeadTop:
      points: 1
      required: true
      defaultMarkings: [ HarpyEarsDefault ]
    HeadSide:
      points: 8
      required: false
    Chest:
      points: 1
      required: true
      defaultMarkings: [ HarpyChestDefault ]
    UndergarmentBottom:
      points: 1
      required: false
    UndergarmentTop:
      points: 1
      required: false
    RightLeg:
      points: 2
      required: false
    RightFoot:
      points: 2
      required: false
    LeftLeg:
      points: 2
      required: false
    LeftFoot:
      points: 2
      required: false
    RightArm:
      points: 1
      required: false
      defaultMarkings: [ HarpyWingDefaultHuescale ]
    RightHand:
      points: 3
      required: false
    LeftArm:
      points: 2
      required: false
    LeftHand:
      points: 3
      required: false


- type: entity
  name: civilian
  parent: BaseMobHuman
  id: MobCivilian
  # description: A miserable pile of secrets. # CorvaxGoob
  components:
  - type: InputMover
  - type: MobMover
  - type: Loadout
    prototypes: [LimitedPassengerGear]
  - type: NpcFactionMember
    factions:
    - NanoTrasen
  - type: PartialAbsorbable # Goobstation - changelings

- type: entity
  name: salvager
  parent: BaseMobHuman
  id: MobSalvager
  components:
    - type: NpcFactionMember
      factions:
        - Syndicate
    - type: Loadout
      prototypes:
        - SalvageSpecialistGear
    - type: InputMover
    - type: MobMover
    - type: HTN
      rootTask:
        task: SimpleHumanoidHostileCompound
    - type: PartialAbsorbable # Goobstation - changelings

- type: entity
  name: spirate
  parent: BaseMobHuman
  id: MobSpirate
  # description: Yarr! # CorvaxGoob
  components:
  - type: NpcFactionMember
    factions:
      - Syndicate
  - type: Loadout
    prototypes:
      - PirateGear
  - type: InputMover
  - type: MobMover
  - type: HTN
    rootTask:
      task: SimpleHumanoidHostileCompound
  - type: PartialAbsorbable # Goobstation - changelings

- type: entity
  name: syndicate footsoldier
  parent: BaseMobHuman
  id: MobSyndicateFootsoldier
  components:
    - type: NpcFactionMember
      factions:
        - Syndicate
    - type: Loadout
      prototypes:
        - SyndicateFootsoldierGearRuin
    - type: InputMover
    - type: MobMover
    - type: HTN
      rootTask:
        task: SimpleHumanoidHostileCompound
    - type: PartialAbsorbable # Goobstation - changelings
    - type: RandomMetadata # CorvaxGoob
      nameSegments:
      - NamesSyndicateFootsoldierRole
      - NamesSyndicateNormal
      nameFormat: name-format-nukie-generic
    - type: AutoImplant #CorvaxGoob MRP lavaland antimunchkinism
      implants: [ DeathAcidifierImplant ]

- type: entity
  name: syndicate shuttle pilot
  parent: MobSyndicateFootsoldier
  id: MobSyndicateFootsoldierPilot

- type: entity
  parent: BaseMobHuman
  suffix: Dead
  save: false # mobs are currently not saveable.
  id: SalvageHumanCorpse
  name: unidentified corpse
  # description: I think they're dead. # CorvaxGoob
  components:
  - type: RandomHumanoidAppearance
    randomizeName: true # CorvaxGoob-changes: false > true
  - type: Damageable
    damage:
      types:
        Bloodloss: 49
        Asphyxiation: 76
        Slash: 56
        Blunt: 19
  # - type: Inventory # CorvaxGoob
  #   templateId: corpse
  - type: PartialAbsorbable # Goobstation - changelings

- type: entity
  parent: MobHuman
  id: MobCluwne
  name: person
  # description: A polymorphed unfortunate. # CorvaxGoob
  components:
  - type: Cluwne
  - type: Speech
    speechVerb: Cluwne

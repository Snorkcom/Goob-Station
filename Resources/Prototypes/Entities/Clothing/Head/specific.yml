- type: entity
  parent: ClothingHeadBase
  id: ClothingHeadHatChameleon
  name: beret
  description: A beret, an artists favorite headwear.
  suffix: Chameleon
  components:
    - type: Tag
      tags: [] # ignore "WhitelistChameleon" tag
    - type: Sprite
      sprite: Clothing/Head/Hats/beret.rsi
    - type: Clothing
      sprite: Clothing/Head/Hats/beret.rsi
    - type: ChameleonClothing
      slot: [HEAD]
      default: ClothingHeadHatBeret
    - type: UserInterface
      interfaces:
        enum.ChameleonUiKey.Key:
          type: ChameleonBoundUserInterface

- type: entity
  parent: [ClothingHeadBase, BaseFoldable, BaseSecurityContraband ] # неиспользуемая система контрабанды с губов
  id: ClothingHeadHatDetGadget
  name: go go hat
  description: A novel hat with a built in toolkit. Automatically stores and retrieves items at the say of a phrase!
  components:
  - type: Clothing
    sprite: Clothing/Head/Hats/gogogadgethat.rsi
  - type: FoldableClothing
    foldedEquippedPrefix: grey
    foldedHeldPrefix: grey
  - type: Appearance 
  - type: Foldable  
    canFoldInsideContainer: true  
    foldVerbText: switch-fedora  
    unfoldVerbText: switch-fedora  
  - type: Sprite
    sprite: Clothing/Head/Hats/gogogadgethat.rsi
    layers:
    - state: icon
      map: [ "unfoldedLayer" ]
    - state: icon-grey
      map: ["foldedLayer"]
      visible: false
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag
  - type: TriggerOnVoice
    keyPhrase: "go go gadget"
    listenRange: 0
  - type: ActiveListener
    range: 0
  - type: StorageVoiceControl
    allowedSlots:
    - HEAD
  - type: Storage
    showVerb: false
    grid:
    - 0,0,3,2
    maxItemSize: Small
    blacklist:
      tags:
      - HighRiskItem # no hiding objectives or trolling nukies
      - FakeNukeDisk # no disk checking
      - QuantumSpinInverter # avoid the morbillionth QSI bug
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: [ ]
  - type: Armor # Goob
    coverage:
    - Head
    traumaDeductions:
      Dismemberment: 0.2
      OrganDamage: 0.2
      BoneDamage: 0.2
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
        Heat: 0.8
